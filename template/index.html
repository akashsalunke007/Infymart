<!DOCTYPE html>
<html>

<head>
    <title>InfyMart</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #e8f0f2;
        }

        .header {
            background: #0b2c6b;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .main {
            background: linear-gradient(to right, #5cc6d0, #48a9b9);
            height: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .welcome {
            color: white;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .box {
            background: #49afd9;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 200px;
            margin: 10px;
            padding: 10px;
            background: #e6863b;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #d96d1a;
        }

        .footer {
            background: #0b2c6b;
            color: white;
            text-align: center;
            padding: 8px;
        }
    </style>

</head>

<body>

    <div class="header">
        <div>InfyMart</div>
        <div>Welcome to Index page</div>
    </div>

    <div class="main">

        <div class="welcome">
            Welcome to InfyMart Selling only the best things online
        </div>

        <div class="box">

            <form action="/customer_login">
                <button class="btn">Customer Login</button>
            </form>

            <form action="/retailer_login">
                <button class="btn">Retailer Login</button>
            </form>

            <form action="/admin_login">
                <button class="btn">Admin Login</button>
            </form>

        </div>

    </div>

    <div class="footer">
        © Copyright belongs to InfyMart
    </div>

</body>

</html>
